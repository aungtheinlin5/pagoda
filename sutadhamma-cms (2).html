<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Suta Dhamma" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ffd04a" />
  <title>သုတဓမ္မ ဒီပလိုမာ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@300;400;500;700&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:    #ffd04a;
      --gold2:   #e6b800;
      --deep:    #1a1200;
      --bg:      #0d0900;
      --surface: #1e1600;
      --surface2:#2a1e00;
      --text:    #f5ead0;
      --muted:   #9e8c5c;
      --rule:    #3a2c00;
      --cat1:    #ffd04a;
      --cat2:    #ff8c42;
      --cat3:    #42c8a8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans Myanmar', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Gold shimmer animation ── */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes rise { to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(255,208,74,.3); }
      50%       { box-shadow: 0 0 24px rgba(255,208,74,.7), 0 0 48px rgba(255,208,74,.2); }
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(.8); }
    }

    /* ── Header ── */
    header {
      background: linear-gradient(180deg, #1e1200 0%, #0d0900 100%);
      border-bottom: 2px solid var(--gold2);
      padding: 2rem 1.25rem 1.5rem;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,.6);
    }
    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: .8rem;
    }
    .logo-img {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      object-fit: cover;
      box-shadow: 0 0 16px rgba(255,208,74,.4);
    }
    .logo-text { text-align: left; }
    .uni-name {
      font-family: 'Cinzel', serif;
      font-size: .65rem;
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .15rem;
    }
    .site-title {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #ffd04a, #fff5cc, #ffd04a, #e6b800);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      line-height: 1.2;
    }
    .site-subtitle {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .06em;
      margin-top: .25rem;
    }

    /* ── Category Tabs ── */
    .cat-nav {
      display: flex;
      gap: .5rem;
      justify-content: center;
      flex-wrap: wrap;
      padding: .75rem 1rem 0;
    }
    .cat-btn {
      border: none;
      cursor: pointer;
      font-family: 'Noto Sans Myanmar', sans-serif;
      font-size: .8rem;
      font-weight: 500;
      padding: .5rem 1.1rem;
      border-radius: 2rem;
      letter-spacing: .03em;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .cat-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,.08);
      opacity: 0;
      transition: opacity .2s;
    }
    .cat-btn:hover::after { opacity: 1; }

    .cat-btn.all {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--rule);
    }
    .cat-btn.all.active {
      background: var(--gold);
      color: var(--deep);
      border-color: var(--gold);
      box-shadow: 0 0 12px rgba(255,208,74,.4);
    }
    .cat-btn.suta1 {
      background: var(--surface2);
      color: #ffd04a;
      border: 1px solid rgba(255,208,74,.25);
    }
    .cat-btn.suta1.active {
      background: var(--gold);
      color: var(--deep);
      border-color: var(--gold);
      box-shadow: 0 0 14px rgba(255,208,74,.5);
    }
    .cat-btn.suta2 {
      background: var(--surface2);
      color: #ff8c42;
      border: 1px solid rgba(255,140,66,.25);
    }
    .cat-btn.suta2.active {
      background: #ff8c42;
      color: #fff;
      border-color: #ff8c42;
      box-shadow: 0 0 14px rgba(255,140,66,.5);
    }
    .cat-btn.suta3 {
      background: var(--surface2);
      color: #42c8a8;
      border: 1px solid rgba(66,200,168,.25);
    }
    .cat-btn.suta3.active {
      background: #42c8a8;
      color: #fff;
      border-color: #42c8a8;
      box-shadow: 0 0 14px rgba(66,200,168,.5);
    }
    .cat-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: .35rem;
      vertical-align: middle;
      background: currentColor;
    }

    /* ── Toolbar ── */
    .toolbar {
      max-width: 1100px;
      margin: 1rem auto 0;
      padding: 0 1.25rem;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: .75rem;
    }
    .post-count {
      font-size: .72rem;
      color: var(--muted);
      letter-spacing: .04em;
    }
    #fetch-btn {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(255,208,74,.35);
      border-radius: 4px;
      padding: .45rem 1rem;
      font-family: 'Noto Sans Myanmar', sans-serif;
      font-size: .78rem;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .2s;
    }
    #fetch-btn:hover    { background: rgba(255,208,74,.1); border-color: var(--gold); }
    #fetch-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Main ── */
    main {
      max-width: 1100px;
      margin: 1.25rem auto 0;
      padding: 0 1.25rem 5rem;
    }

    /* ── Divider ── */
    .section-rule {
      display: none;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .section-rule span {
      font-size: .62rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .section-rule::before,
    .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rule), transparent);
    }

    /* ── Spinner ── */
    #spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 5rem 0;
    }
    .spin-ring {
      width: 44px; height: 44px;
      border: 2px solid var(--rule);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .spin-label {
      font-size: .72rem;
      letter-spacing: .1em;
      color: var(--muted);
    }

    /* ── Error / Empty ── */
    #error-box, #empty-box {
      display: none;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
      padding: 1.1rem 1.4rem;
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    /* ── Masonry ── */
    #feed { columns: 1; column-gap: 1.25rem; }
    @media (min-width: 640px)  { #feed { columns: 2; } }
    @media (min-width: 1000px) { #feed { columns: 3; } }

    /* ── Card ── */
    .card {
      break-inside: avoid;
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      opacity: 0;
      transform: translateY(16px);
      animation: rise .4s ease forwards;
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover {
      border-color: rgba(255,208,74,.3);
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .card.hidden { display: none; }

    /* Category stripe on card */
    .card-stripe {
      height: 3px;
      width: 100%;
    }
    .card-stripe.suta1 { background: var(--cat1); }
    .card-stripe.suta2 { background: var(--cat2); }
    .card-stripe.suta3 { background: var(--cat3); }
    .card-stripe.uncategorized { background: var(--rule); }

    /* ── Media ── */
    .card-image {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 340px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .card-image:hover { opacity: .88; }

    .card-video {
      width: 100%;
      display: block;
      max-height: 380px;
      background: #000;
    }

    .video-thumb-wrap {
      position: relative;
      cursor: pointer;
      background: #000;
      overflow: hidden;
    }
    .video-thumb-wrap img {
      width: 100%;
      display: block;
      max-height: 340px;
      object-fit: cover;
      opacity: .82;
      transition: opacity .2s;
    }
    .video-thumb-wrap:hover img { opacity: .65; }
    .play-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 52px; height: 52px;
      background: rgba(255,208,74,.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      box-shadow: 0 2px 16px rgba(0,0,0,.5);
    }
    .play-btn svg { width: 20px; height: 20px; fill: var(--deep); margin-left: 3px; }
    .video-duration {
      position: absolute;
      bottom: .5rem; right: .6rem;
      background: rgba(0,0,0,.7);
      color: var(--gold);
      font-size: .65rem;
      padding: .1rem .45rem;
      border-radius: 3px;
      letter-spacing: .04em;
    }

    /* Audio */
    .card-audio {
      width: 100%;
      padding: 1rem 1.25rem .5rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      background: var(--surface2);
    }
    .audio-meta { display: flex; align-items: center; gap: .6rem; }
    .audio-icon {
      width: 34px; height: 34px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .audio-icon svg { width: 15px; height: 15px; fill: var(--deep); }
    .audio-title { font-size: .78rem; font-weight: 500; color: var(--text); word-break: break-all; }
    .audio-player { width: 100%; height: 30px; filter: invert(.9) sepia(.3) saturate(2) hue-rotate(5deg); }

    /* Gallery */
    .card-gallery { display: grid; gap: 2px; }
    .card-gallery.count-2 { grid-template-columns: 1fr 1fr; }
    .card-gallery.count-3 { grid-template-columns: 1fr 1fr; }
    .card-gallery.count-3 .gal-img:first-child { grid-column: 1 / -1; }
    .card-gallery.count-4, .card-gallery.count-many { grid-template-columns: 1fr 1fr; }
    .gal-img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover; display: block;
      cursor: pointer; transition: opacity .15s;
    }
    .gal-img:hover { opacity: .82; }
    .gal-more-wrap { position: relative; }
    .gal-more-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 1.3rem; font-weight: 700;
      pointer-events: none;
    }

    /* Card body */
    .card-body { padding: 1rem 1.2rem 1.2rem; }
    .card-meta {
      display: flex; align-items: center; gap: .5rem;
      margin-bottom: .65rem; flex-wrap: wrap;
    }
    .card-date {
      font-size: .62rem; letter-spacing: .08em;
      text-transform: uppercase; color: var(--muted);
    }
    .card-badge {
      font-size: .58rem;
      border-radius: 3px;
      padding: .08rem .4rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      border: 1px solid currentColor;
      opacity: .75;
    }
    .card-badge.video-badge { color: #a0c4ff; }
    .card-badge.audio-badge { color: var(--gold); }
    .card-badge.photo-badge { color: var(--muted); }

    /* Category pill on card */
    .cat-pill {
      font-size: .58rem;
      border-radius: 2rem;
      padding: .1rem .55rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .cat-pill.suta1 { background: rgba(255,208,74,.15); color: var(--cat1); }
    .cat-pill.suta2 { background: rgba(255,140,66,.15); color: var(--cat2); }
    .cat-pill.suta3 { background: rgba(66,200,168,.15); color: var(--cat3); }

    .card-text {
      font-size: .88rem;
      line-height: 1.7;
      color: #d5c9a8;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .card-text a { color: var(--gold); text-decoration: underline; text-underline-offset: 2px; }
    .card-text strong { color: var(--text); }

    .card-footer {
      border-top: 1px solid var(--rule);
      margin-top: .9rem; padding-top: .7rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .stat {
      display: flex; align-items: center; gap: .3rem;
      font-size: .68rem; color: var(--muted);
    }
    .stat svg { width: 12px; height: 12px; fill: var(--muted); }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.95); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw; max-height: 90vh;
      object-fit: contain; border-radius: 4px;
      border: 1px solid rgba(255,208,74,.2);
    }
    #lightbox-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      color: var(--gold); font-size: 2rem; cursor: pointer;
      opacity: .7; transition: opacity .15s; line-height: 1;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── Video Modal ── */
    #video-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.97); z-index: 1000;
      align-items: center; justify-content: center;
    }
    #video-modal.open { display: flex; }
    #video-modal video {
      max-width: 94vw; max-height: 88vh;
      border-radius: 4px; background: #000;
    }
    #video-modal-close {
      position: absolute; top: 1.25rem; right: 1.5rem;
      color: var(--gold); font-size: 2rem; cursor: pointer;
      opacity: .7; transition: opacity .15s; line-height: 1;
    }
    #video-modal-close:hover { opacity: 1; }

    /* ── Decorative bottom ornament ── */
    .footer-ornament {
      text-align: center;
      padding: 2rem 0 1rem;
      color: var(--rule);
      font-size: .75rem;
      letter-spacing: .1em;
    }
    .ornament-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rule), transparent);
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

  <!-- Lightbox -->
  <div id="lightbox">
    <span id="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <!-- Video Modal -->
  <div id="video-modal">
    <span id="video-modal-close">&times;</span>
    <video id="modal-video" controls playsinline></video>
  </div>

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <img
        class="logo-img"
        src="https://i.ibb.co/LDh3jzBD/Sayadaw-nandamalabhivamsa.jpg"
        alt="logo"
        onerror="this.style.display='none'"
      />
      <div class="logo-text">
        <div class="uni-name">University of Wisdom Land</div>
        <div class="site-title">သုတဓမ္မ ဒီပလိုမာ</div>
        <div class="site-subtitle" id="dateline">Powered by Telegram</div>
      </div>
    </div>

    <!-- Category Tabs -->
    <nav class="cat-nav">
      <button class="cat-btn suta1 active" data-cat="suta1" onclick="filterCat('suta1',this)">
        <span class="cat-dot"></span>Level 1
      </button>
      <button class="cat-btn suta2" data-cat="suta2" onclick="filterCat('suta2',this)">
        <span class="cat-dot"></span>Level 2
      </button>
      <button class="cat-btn suta3" data-cat="suta3" onclick="filterCat('suta3',this)">
        <span class="cat-dot"></span>Level 3
      </button>
    </nav>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="post-count" id="post-count"></span>
    <button id="fetch-btn">↻ Refresh</button>
  </div>

  <main>
    <div id="spinner">
      <div class="spin-ring"></div>
      <span class="spin-label">Post တွေ ယူနေသည်…</span>
    </div>
    <div id="error-box"></div>
    <div id="empty-box">Post မတွေ့ပါ။ Bot က Channel Admin ဖြစ်ပြီး Post အနည်းဆုံး တစ်ခု ပို့ထားဖို့ လိုပါတယ်။</div>
    <div class="section-rule" id="section-rule"><span>❋ Posts ❋</span></div>
    <div id="feed"></div>
    <div class="footer-ornament" id="footer-ornament" style="display:none">
      <div class="ornament-line"></div>
      ☸ သုတဓမ္မ ☸
    </div>
  </main>

  <script>
    const TOKEN   = '8590519767:AAFco5djmqneNgq1xl7BQh_b9E3uw5gL-Jg';
    const CHANNEL = '@thuetamm';
    const LIMIT   = 20;
    const BASE    = 'https://api.telegram.org';

    // ── Category config ──
    const CATEGORIES = {
      suta1: { label: 'Level 1', color: '#ffd04a', tag: '#suta1' },
      suta2: { label: 'Level 2', color: '#ff8c42', tag: '#suta2' },
      suta3: { label: 'Level 3', color: '#42c8a8', tag: '#suta3' },
    };

    let currentCat = 'suta1';

    const fetchBtn    = document.getElementById('fetch-btn');
    const spinner     = document.getElementById('spinner');
    const errorBox    = document.getElementById('error-box');
    const emptyBox    = document.getElementById('empty-box');
    const feed        = document.getElementById('feed');
    const sectionRule = document.getElementById('section-rule');
    const datelineEl  = document.getElementById('dateline');
    const postCount   = document.getElementById('post-count');
    const footerOrn   = document.getElementById('footer-ornament');
    const lightbox    = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const videoModal  = document.getElementById('video-modal');
    const modalVideo  = document.getElementById('modal-video');

    // ── Lightbox ──
    document.getElementById('lightbox-close').onclick = () => lightbox.classList.remove('open');
    lightbox.onclick = e => { if (e.target === lightbox) lightbox.classList.remove('open'); };
    function openLightbox(src) { lightboxImg.src = src; lightbox.classList.add('open'); }

    // ── Video Modal ──
    document.getElementById('video-modal-close').onclick = closeVideoModal;
    videoModal.onclick = e => { if (e.target === videoModal) closeVideoModal(); };
    function openVideoModal(src) {
      modalVideo.pause(); modalVideo.innerHTML = '';
      const s = document.createElement('source'); s.src = src; s.type = 'video/mp4';
      modalVideo.appendChild(s); modalVideo.load();
      videoModal.classList.add('open');
      modalVideo.play().catch(() => {});
    }
    function closeVideoModal() {
      modalVideo.pause(); modalVideo.innerHTML = '';
      videoModal.classList.remove('open');
    }

    // ── Category filter ──
    function filterCat(cat, btn) {
      currentCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cards = feed.querySelectorAll('.card');
      let visible = 0;
      cards.forEach(c => {
        const match = cat === 'all' || c.dataset.cat === cat;
        c.classList.toggle('hidden', !match);
        if (match) visible++;
      });
      updateCount(visible);
    }

    function updateCount(n) {
      postCount.textContent = n > 0 ? `${n} post${n === 1 ? '' : 's'}` : '';
    }

    // ── Helpers ──
    function show(el)      { el.style.display = 'flex'; }
    function hide(el)      { el.style.display = 'none'; }
    function showBlock(el) { el.style.display = 'block'; }
    function setError(msg) { errorBox.textContent = '⚠ ' + msg; showBlock(errorBox); }
    function clearUI() {
      hide(spinner); hide(errorBox); errorBox.textContent = '';
      hide(emptyBox); hide(sectionRule); hide(footerOrn); feed.innerHTML = '';
      postCount.textContent = '';
    }
    function formatDate(unix) {
      return new Date(unix * 1000).toLocaleDateString('my-MM', {
        day: 'numeric', month: 'long', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }
    function formatDuration(secs) {
      const m = Math.floor(secs / 60), s = secs % 60;
      return `${m}:${String(s).padStart(2,'0')}`;
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function linkify(text) {
      return esc(text).replace(/(https?:\/\/[^\s]+)/g,
        u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
    }
    function applyEntities(text, entities) {
      if (!entities || !entities.length) return linkify(text);
      const sorted = [...entities].sort((a,b) => a.offset - b.offset);
      let out = '', pos = 0;
      for (const e of sorted) {
        if (e.offset > pos) out += linkify(text.slice(pos, e.offset));
        const chunk = text.slice(e.offset, e.offset + e.length);
        switch (e.type) {
          case 'bold':      out += `<strong>${esc(chunk)}</strong>`; break;
          case 'italic':    out += `<em>${esc(chunk)}</em>`; break;
          case 'code':      out += `<code>${esc(chunk)}</code>`; break;
          case 'text_link': out += `<a href="${e.url}" target="_blank" rel="noopener">${esc(chunk)}</a>`; break;
          case 'url':       out += `<a href="${esc(chunk)}" target="_blank" rel="noopener">${esc(chunk)}</a>`; break;
          default:          out += esc(chunk);
        }
        pos = e.offset + e.length;
      }
      if (pos < text.length) out += linkify(text.slice(pos));
      return out;
    }

    // ── Detect category from hashtag ──
    function detectCategory(text) {
      if (!text) return 'uncategorized';
      const lower = text.toLowerCase();
      if (lower.includes('#suta3')) return 'suta3';
      if (lower.includes('#suta2')) return 'suta2';
      if (lower.includes('#suta1')) return 'suta1';
      return 'uncategorized';
    }

    // ── Strip hashtags from display text ──
    function stripHashtags(text) {
      return text.replace(/#suta[123]\b/gi, '').trim();
    }

    // ── Telegram API ──
    async function tgGet(method, params = {}) {
      const qs  = new URLSearchParams(params).toString();
      const res = await fetch(`${BASE}/bot${TOKEN}/${method}${qs ? '?' + qs : ''}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (!json.ok) throw new Error(json.description || 'Telegram error');
      return json.result;
    }
    async function getFileUrl(file_id) {
      try {
        const f = await tgGet('getFile', { file_id });
        return `${BASE}/file/bot${TOKEN}/${f.file_path}`;
      } catch { return null; }
    }

    // ── Gallery ──
    function buildGallery(urls) {
      if (!urls.length) return '';
      if (urls.length === 1) {
        return `<img class="card-image" src="${urls[0]}" alt="" loading="lazy" onclick="openLightbox('${urls[0]}')" />`;
      }
      const shown = urls.slice(0, 4);
      const leftover = urls.length - 4;
      const cc = urls.length === 2 ? 'count-2' : urls.length === 3 ? 'count-3' : urls.length === 4 ? 'count-4' : 'count-many';
      const items = shown.map((url, i) => {
        if (i === 3 && leftover > 0) {
          return `<div class="gal-more-wrap">
            <img class="gal-img" src="${url}" alt="" loading="lazy" onclick="openLightbox('${url}')" />
            <div class="gal-more-overlay">+${leftover + 1}</div>
          </div>`;
        }
        return `<img class="gal-img" src="${url}" alt="" loading="lazy" onclick="openLightbox('${url}')" />`;
      }).join('');
      return `<div class="card-gallery ${cc}">${items}</div>`;
    }

    // ── Video ──
    function buildVideoThumb(videoUrl, thumbUrl, duration) {
      const durationHtml = duration ? `<span class="video-duration">${formatDuration(duration)}</span>` : '';
      if (thumbUrl) {
        return `<div class="video-thumb-wrap" onclick="openVideoModal('${videoUrl}')">
          <img src="${thumbUrl}" alt="" loading="lazy" />
          <div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
          ${durationHtml}
        </div>`;
      }
      return `<video class="card-video" controls playsinline preload="metadata">
        <source src="${videoUrl}" type="video/mp4" />
      </video>`;
    }

    // ── Audio ──
    function buildAudio(audioUrl, fileName, duration) {
      const durationHtml = duration ? ` · ${formatDuration(duration)}` : '';
      const displayName  = fileName || 'Audio';
      return `<div class="card-audio">
        <div class="audio-meta">
          <div class="audio-icon">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
          </div>
          <span class="audio-title">${esc(displayName)}${durationHtml}</span>
        </div>
        <audio class="audio-player" controls preload="metadata">
          <source src="${audioUrl}" />
        </audio>
      </div>`;
    }

    // ── Build Card ──
    function buildCard(g, delay) {
      const card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = delay + 'ms';

      // Detect category
      const cat = detectCategory(g.text);
      card.dataset.cat = cat;

      // Strip hashtags from text for display
      const displayText = g.text ? stripHashtags(g.text) : '';

      let mediaHtml = '';
      let badgeLabel = '';

      if (g.videoUrl) {
        mediaHtml  = buildVideoThumb(g.videoUrl, g.thumbUrl, g.duration);
        badgeLabel = `<span class="card-badge video-badge">▶ Video</span>`;
      } else if (g.audioUrl) {
        mediaHtml  = buildAudio(g.audioUrl, g.audioFileName, g.duration);
        badgeLabel = `<span class="card-badge audio-badge">♪ Audio</span>`;
      } else if (g.imageUrls && g.imageUrls.length) {
        mediaHtml  = buildGallery(g.imageUrls);
        badgeLabel = g.imageUrls.length > 1
          ? `<span class="card-badge photo-badge">${g.imageUrls.length} Photos</span>`
          : `<span class="card-badge photo-badge">Photo</span>`;
      }

      // Category stripe + pill
      const stripeHtml = `<div class="card-stripe ${cat}"></div>`;
      const catInfo = CATEGORIES[cat];
      const catPillHtml = catInfo
        ? `<span class="cat-pill ${cat}">${catInfo.label}</span>`
        : '';

      const textHtml = displayText
        ? `<p class="card-text">${applyEntities(displayText, g.entities)}</p>` : '';

      const viewsStat = g.views != null
        ? `<div class="card-footer">
             <span class="stat">
               <svg viewBox="0 0 20 20"><path d="M10 3C5 3 1.73 7.11 1.05 10c.68 2.89 3.95 7 8.95 7s8.27-4.11 8.95-7C18.27 7.11 15 3 10 3zm0 12a5 5 0 110-10 5 5 0 010 10zm0-8a3 3 0 100 6 3 3 0 000-6z"/></svg>
               ${g.views.toLocaleString()}
             </span>
           </div>` : '';

      card.innerHTML = `
        ${stripeHtml}
        ${mediaHtml}
        <div class="card-body">
          <div class="card-meta">
            <span class="card-date">${formatDate(g.date)}</span>
            ${badgeLabel}
            ${catPillHtml}
          </div>
          ${textHtml}
          ${viewsStat}
        </div>`;

      return card;
    }

    // ── Main Load ──
    async function loadFeed() {
      clearUI();
      fetchBtn.disabled = true;
      show(spinner);
      currentCat = 'suta1';
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.cat-btn.suta1').classList.add('active');

      try {
        let chatInfo;
        try {
          chatInfo = await tgGet('getChat', { chat_id: CHANNEL });
        } catch(e) {
          throw new Error('Channel ကို access မရပါ။ Bot က Channel Admin ဖြစ်ဖို့ လိုပါတယ်။ (' + e.message + ')');
        }

        datelineEl.textContent = `@${chatInfo.username || CHANNEL} · ` +
          new Date().toLocaleDateString('my-MM', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

        const updates = await tgGet('getUpdates', {
          offset: -100,
          limit: 100,
          allowed_updates: JSON.stringify(['channel_post'])
        });

        const targetId = String(chatInfo.id);
        const rawPosts = updates
          .filter(u => u.channel_post && String(u.channel_post.chat.id) === targetId)
          .map(u => u.channel_post)
          .sort((a, b) => a.date - b.date);

        // Group by media_group_id
        const grouped  = [];
        const groupMap = new Map();

        for (const msg of rawPosts) {
          const isVideo = !!(msg.video || msg.video_note || msg.animation);
          const isPhoto = !!msg.photo;
          const isAudio = !!(msg.audio || msg.voice);
          const audioObj = msg.audio || msg.voice || null;

          if (msg.media_group_id) {
            if (groupMap.has(msg.media_group_id)) {
              const g = groupMap.get(msg.media_group_id);
              if (isPhoto) g._photos.push(msg.photo[msg.photo.length - 1].file_id);
              if (isVideo && !g._videoFileId) {
                const vid = msg.video || msg.animation;
                g._videoFileId = vid ? vid.file_id : null;
                g._thumbFileId = vid && (vid.thumbnail || vid.thumb) ? (vid.thumbnail || vid.thumb).file_id : null;
                g.duration     = vid ? vid.duration : null;
              }
              if (isAudio && !g._audioFileId) {
                g._audioFileId  = audioObj.file_id;
                g.audioFileName = audioObj.file_name || audioObj.title || 'audio';
                g.duration      = audioObj.duration || null;
              }
              if (!g.text && (msg.caption || msg.text)) {
                g.text     = msg.caption || msg.text || '';
                g.entities = msg.caption_entities || msg.entities || [];
              }
              if (msg.views != null && g.views == null) g.views = msg.views;
            } else {
              const vid = msg.video || msg.animation;
              const g = {
                date: msg.date, views: msg.views ?? null,
                text: msg.caption || msg.text || '',
                entities: msg.caption_entities || msg.entities || [],
                _photos: isPhoto ? [msg.photo[msg.photo.length - 1].file_id] : [],
                _videoFileId: isVideo && vid ? vid.file_id : null,
                _thumbFileId: isVideo && vid && (vid.thumbnail || vid.thumb) ? (vid.thumbnail || vid.thumb).file_id : null,
                duration: isVideo && vid ? vid.duration : isAudio && audioObj ? audioObj.duration : null,
                _audioFileId: isAudio ? audioObj.file_id : null,
                audioFileName: isAudio ? (audioObj.file_name || audioObj.title || 'audio') : null,
                imageUrls: [], videoUrl: null, thumbUrl: null, audioUrl: null,
              };
              groupMap.set(msg.media_group_id, g);
              grouped.push(g);
            }
          } else {
            const vid = msg.video || msg.animation;
            grouped.push({
              date: msg.date, views: msg.views ?? null,
              text: msg.text || msg.caption || '',
              entities: msg.entities || msg.caption_entities || [],
              _photos: isPhoto ? [msg.photo[msg.photo.length - 1].file_id] : [],
              _videoFileId: isVideo && vid ? vid.file_id : null,
              _thumbFileId: isVideo && vid && (vid.thumbnail || vid.thumb) ? (vid.thumbnail || vid.thumb).file_id : null,
              duration: isVideo && vid ? vid.duration : isAudio && audioObj ? audioObj.duration : null,
              _audioFileId: isAudio ? audioObj.file_id : null,
              audioFileName: isAudio ? (audioObj.file_name || audioObj.title || 'audio') : null,
              imageUrls: [], videoUrl: null, thumbUrl: null, audioUrl: null,
            });
          }
        }

        const sorted = grouped.sort((a,b) => b.date - a.date).slice(0, LIMIT);

        hide(spinner);
        if (!sorted.length) { showBlock(emptyBox); return; }
        sectionRule.style.display = 'flex';

        await Promise.all(sorted.map(async g => {
          if (g._photos.length)   g.imageUrls = (await Promise.all(g._photos.map(getFileUrl))).filter(Boolean);
          if (g._videoFileId)     g.videoUrl  = await getFileUrl(g._videoFileId);
          if (g._thumbFileId)     g.thumbUrl  = await getFileUrl(g._thumbFileId);
          if (g._audioFileId)     g.audioUrl  = await getFileUrl(g._audioFileId);
        }));

        sorted.forEach((g, i) => feed.appendChild(buildCard(g, i * 60)));

        // Apply current category filter right after render
        const cards = feed.querySelectorAll('.card');
        let visible = 0;
        cards.forEach(c => {
          const match = currentCat === 'all' || c.dataset.cat === currentCat;
          c.classList.toggle('hidden', !match);
          if (match) visible++;
        });
        updateCount(visible);
        footerOrn.style.display = 'block';

      } catch(err) {
        hide(spinner);
        setError(err.message);
      } finally {
        fetchBtn.disabled = false;
      }
    }

    fetchBtn.addEventListener('click', loadFeed);
    datelineEl.textContent = new Date().toLocaleDateString('my-MM', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });
    loadFeed();
  </script>
</body>
</html>
